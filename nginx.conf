server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # React Router support (SPA fallback)
  location / {
    try_files $uri /index.html;
  }

  # Optional: cache static assets hard (good for perf)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}